<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>データベース構築ツール（かね将ポータル）</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SheetJS for processing Excel -->
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center;">

    <div class="glass-panel" style="padding: 3rem; max-width: 600px; width: 100%;">
        <i class="fas fa-database" style="font-size: 4rem; color: var(--primary); margin-bottom: 1rem;"></i>
        <div style="margin-bottom: 1.5rem;">
            <input type="file" id="file-input" accept=".xlsx, .xls" style="display: none;">
            <button id="select-btn" class="btn" onclick="document.getElementById('file-input').click()" style="width: 100%; border: 1px dashed var(--primary); color: var(--primary); padding: 1.5rem; margin-bottom: 1rem; border-radius: 8px;">
                <i class="fas fa-file-excel" style="font-size: 1.5rem; display: block; margin-bottom: 0.5rem;"></i>
                <span id="file-name">Excelファイルを選択</span>
            </button>
            <button id="import-btn" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; display: none;">
                <i class="fas fa-play"></i> インポートを開始
            </button>
        </div>

        <div id="sheet-selector-container" style="display: none; margin-top: 1.5rem; text-align: left; border-top: 1px solid var(--border); padding-top: 1rem; flex-wrap: wrap; gap: 0.8rem;">
            <!-- チェックボックスがここに入ります -->
        </div>

        <div id="log-area" style="margin-top: 2rem; text-align: left; background: rgba(0,0,0,0.05); padding: 1rem; border-radius: 8px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; color: var(--text-secondary); display: none;">
            <!-- ログがここに入ります -->
        </div>
    </div>

    <script type="module" src="seed.js"></script>
</body>
</html>
